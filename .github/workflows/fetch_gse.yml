name: Fetch GSE Data

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Fetch GSE prices
        run: |
          python3 - <<'EOF'
          import urllib.request
          import json

          url = "https://dev.kwayisi.org/apis/gse/live"
          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36",
              "Accept": "application/json",
          }
          req = urllib.request.Request(url, headers=headers)
          with urllib.request.urlopen(req, timeout=30) as response:
              data = response.read().decode()
          
          with open("gse_prices.json", "w") as f:
              f.write(data)
          
          print("Success! Fetched", len(json.loads(data)), "stocks")
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add gse_prices.json
          git diff --staged --quiet || git commit -m "Update GSE prices"
          git push
